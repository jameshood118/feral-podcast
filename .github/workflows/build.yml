name: Deploy Feral Podcast Feeds

on:
  push:
    branches:
      - main
    paths:
      - 'show/**/episodes/**' 
  workflow_dispatch: # Allows manual trigger from the GitHub dashboard

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip pip install -r requirements.txt

      - name: Execute Python Engine
        run: python generate_feed.py

      - name: Commit XML to Repository
        run: |
          git config --global user.name "Sovereign-Automation-Bot"
          git config --global user.email "bot@saiphhouse.net"
          git add show/**/rss.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated RSS XML Update: Multi-Show Sync" && git push)