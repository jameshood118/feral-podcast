name: Deploy Feral Podcast Feeds

on:
  push:
    branches:
      - main
    paths:
      - 'inputs/show/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Python Engine
        run: python generate_feed.py

      - name: Commit Artifacts to Repository
        run: |
          git config --global user.name "Sovereign-Automation-Bot"
          git config --global user.email "bot@saiphhouse.net"
          
          # Stage the XMLs, the README, AND any Markdown files Python just injected GUIDs into
          git add outputs/show/**/rss.xml README.md inputs/show/**/episodes/*.md
          
          # The [skip ci] tag is the kill-switch that prevents the infinite recursive loop
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated RSS Update: Inject GUIDs and Sync Feeds [skip ci]" && git push)